<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Vocabulary Flashcards</title>
<style>
  :root{
    --bg:#f4f6fb; --card-bg:#fff; --text:#1f2433; --accent:#4f63d2;
    --muted:#6b7280; --border:#e3e6ef; --shadow:0 8px 24px rgba(31,36,51,0.08);
  }
  [data-theme="dark"]{
    --bg:#15161d; --card-bg:#1f212b; --text:#eef0f6;
    --muted:#9aa1b5; --border:#2c2f3a; --shadow:0 8px 24px rgba(0,0,0,0.4);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); transition:background .3s,color .3s;
    min-height:100vh;
  }
  .app{max-width:760px;margin:0 auto;padding:16px 16px 60px;}
  header{
    display:flex; justify-content:space-between; align-items:center; padding:8px 0 16px;
    flex-wrap:wrap; gap:10px;
  }
  h1{font-size:1.3rem;margin:0;}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  button{
    border:none; border-radius:10px; padding:8px 14px; cursor:pointer; font-size:0.85rem;
    background:var(--accent); color:#fff; transition:transform .15s, opacity .15s;
  }
  button:hover{opacity:0.9;}
  button:active{transform:scale(0.96);}
  button.ghost{
    background:transparent; color:var(--text); border:1px solid var(--border);
  }
  input[type="text"]{
    padding:8px 12px; border-radius:10px; border:1px solid var(--border);
    background:var(--card-bg); color:var(--text); font-size:0.85rem; width:160px;
  }
  .chapter-bar{
    display:flex; gap:6px; overflow-x:auto; padding:6px 0 14px; -ms-overflow-style:none;
  }
  .chapter-bar::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto; padding:7px 12px; border-radius:20px; border:1px solid var(--border);
    background:var(--card-bg); color:var(--muted); font-size:0.78rem; cursor:pointer; white-space:nowrap;
  }
  .chip.active{background:var(--accent); color:#fff; border-color:var(--accent);}
  .progress-wrap{margin-bottom:10px;}
  .progress-bar{height:6px; background:var(--border); border-radius:6px; overflow:hidden;}
  .progress-fill{height:100%; background:var(--accent); transition:width .3s;}
  .progress-text{font-size:0.75rem; color:var(--muted); margin-top:4px; text-align:right;}
 
  .card-stage{
    perspective:1500px; height:300px; margin:10px 0 18px; position:relative;
  }
  .flashcard{
    width:100%; height:100%; position:relative; transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.4,.2,.2,1); cursor:pointer;
  }
  .flashcard.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute; inset:0; backface-visibility:hidden; border-radius:18px;
    background:var(--card-bg); box-shadow:var(--shadow); border:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px; text-align:center;
  }
  .face.back{transform:rotateY(180deg);}
  .pos-tag{
    font-size:0.72rem; letter-spacing:.05em; text-transform:uppercase; color:var(--accent);
    background:rgba(79,99,210,0.1); padding:3px 10px; border-radius:20px; margin-bottom:14px;
  }
  .word{font-size:1.8rem; font-weight:700;}
  .chapter-tag{
    position:absolute; top:14px; left:18px; font-size:0.7rem; color:var(--muted);
  }
  .hint{position:absolute; bottom:14px; font-size:0.7rem; color:var(--muted);}
  .thai{font-size:1.4rem; font-weight:600; margin-bottom:10px;}
  .english-def{font-size:0.95rem; color:var(--muted); max-width:90%;}
 
  .nav-row{display:flex; justify-content:space-between; align-items:center; gap:10px;}
  .nav-row button{flex:1; padding:12px;}
  .center-actions{display:flex; gap:8px;}
 
  .word-list-toggle{margin-top:18px; text-align:center;}
  .word-list{
    display:none; margin-top:12px; max-height:260px; overflow-y:auto;
    border:1px solid var(--border); border-radius:14px; padding:8px;
  }
  .word-list.open{display:block;}
  .word-item{
    padding:9px 10px; border-radius:8px; cursor:pointer; font-size:0.85rem;
    display:flex; justify-content:space-between; align-items:center;
  }
  .word-item:hover{background:rgba(79,99,210,0.08);}
  .word-item.current{background:rgba(79,99,210,0.15); font-weight:600;}
  .word-item .meta{color:var(--muted); font-size:0.75rem;}
  .empty-msg{text-align:center; color:var(--muted); padding:40px 10px;}
  footer{text-align:center; color:var(--muted); font-size:0.72rem; margin-top:24px;}
  @media (max-width:480px){
    .word{font-size:1.4rem;}
    .card-stage{height:260px;}
  }
</style>
</head>
<body data-theme="light">
<div class="app">
  <header>
    <h1>📚 Vocabulary Flashcards</h1>
    <div class="controls">

    </div>
  </header>
 
  <div class="chapter-bar" id="chapterBar"></div>
 
  <div class="progress-wrap">

    <div class="progress-text" id="progressText"></div>
  </div>
 
  <div id="cardArea">
    <div class="card-stage">
      <div class="flashcard" id="flashcard">
        <div class="face front">
          <span class="chapter-tag" id="chapterTagFront"></span>
          <div class="word" id="wordFront"></div>
          <span class="pos-tag" id="posTag"></span>
          <span class="hint">Click to flip ↻</span>
        </div>
        <div class="face back">
          <span class="chapter-tag" id="chapterTagBack"></span>
          <div class="thai" id="thaiMeaning"></div>
          <div class="english-def" id="englishDef"></div>
          <span class="hint">Click to flip ↻</span>
        </div>
      </div>
    </div>
 
    <div class="nav-row">
      <button class="ghost" id="prevBtn">← Prev</button>
      <div class="center-actions">
        <button class="ghost" id="shuffleBtn">🔀 Shuffle</button>
        <button class="ghost" id="flipBtn">↻ Flip</button>
      </div>
      <button class="ghost" id="nextBtn">Next →</button>
    </div>
 
    <div class="word-list-toggle">
      <button class="ghost" id="listToggleBtn">📋 Show Word List</button>
    </div>
    <div class="word-list" id="wordList"></div>
  </div>
 
  <div id="emptyState" class="empty-msg" style="display:none;">No matching words found.</div>
 
  <footer>Keyboard: ← → navigate · Space/Enter flip · S shuffle</footer>
</div>

  {ch:10, chName:"Remaining Work", color:"#b08c4f", word:"ordinary", pos:"adjective", thai:"ธรรมดา, ปกติ", en:"Normal and not special"},
  {ch:10, chName:"Remaining Work", color:"#b08c4f", word:"population", pos:"noun", thai:"ประชากร", en:"The number of people living in a place"},
  {ch:10, chName:"Remaining Work", color:"#b08c4f", word:"reliable", pos:"adjective", thai:"น่าเชื่อถือ", en:"Able to be trusted to work or behave well"},
  {ch:10, chName:"Remaining Work", color:"#b08c4f", word:"role", pos:"noun", thai:"บทบาท", en:"The part someone plays in a situation"},
  {ch:10, chName:"Remaining Work", color:"#b08c4f", word:"security", pos:"noun", thai:"ความปลอดภัย", en:"Protection from danger or risk"},
  {ch:10, chName:"Remaining Work", color:"#b08c4f", word:"sensitive", pos:"adjective", thai:"อ่อนไหว, บอบบาง", en:"Easily affected or emotionally reactive"},
  {ch:10, chName:"Remaining Work", color:"#b08c4f", word:"sketch", pos:"noun/verb", thai:"ภาพร่าง, วาดร่าง", en:"A simple, quick drawing"},
  {ch:10, chName:"Remaining Work", color:"#b08c4f", word:"visa", pos:"noun", thai:"วีซ่า", en:"An official document allowing entry to a country"},
];
 
let activeDeck = [...vocab];
let currentIndex = 0;
let activeChapter = "all";
let isFlipped = false;
 
const chapters = [...new Map(vocab.map(v => [v.ch, {ch:v.ch, name:v.chName, color:v.color}])).values()]
  .sort((a,b) => a.ch - b.ch);
 
const chapterBar = document.getElementById('chapterBar');
const flashcard = document.getElementById('flashcard');
const wordFront = document.getElementById('wordFront');
const posTag = document.getElementById('posTag');
const thaiMeaning = document.getElementById('thaiMeaning');
const englishDef = document.getElementById('englishDef');
const chapterTagFront = document.getElementById('chapterTagFront');
const chapterTagBack = document.getElementById('chapterTagBack');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const wordList = document.getElementById('wordList');
const cardArea = document.getElementById('cardArea');
const emptyState = document.getElementById('emptyState');
const searchBox = document.getElementById('searchBox');
 
function renderChapterBar(){
  let html = `<div class="chip ${activeChapter==='all'?'active':''}" data-ch="all">All (${vocab.length})</div>`;
  chapters.forEach(c => {
    const count = vocab.filter(v=>v.ch===c.ch).length;
    html += `<div class="chip ${activeChapter===c.ch?'active':''}" data-ch="${c.ch}">Ch.${c.ch} ${c.name} (${count})</div>`;
  });
  chapterBar.innerHTML = html;
  chapterBar.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const ch = chip.dataset.ch;
      activeChapter = ch === 'all' ? 'all' : Number(ch);
      filterDeck();
    });
  });
}
 
function filterDeck(){
  const query = searchBox.value.trim().toLowerCase();
  let deck = activeChapter === 'all' ? [...vocab] : vocab.filter(v => v.ch === activeChapter);
  if(query){
    deck = deck.filter(v => v.word.toLowerCase().includes(query) || v.thai.includes(query) || v.en.toLowerCase().includes(query));
  }
  activeDeck = deck;
  currentIndex = 0;
  isFlipped = false;
  renderChapterBar();
  renderCard();
  renderWordList();
}
 
function renderCard(){
  if(activeDeck.length === 0){
    cardArea.style.display = 'none';
    emptyState.style.display = 'block';
    return;
  }
  cardArea.style.display = 'block';
  emptyState.style.display = 'none';
  const item = activeDeck[currentIndex];
  flashcard.classList.remove('flipped');
  isFlipped = false;
  wordFront.textContent = item.word;
  posTag.textContent = item.pos;
  posTag.style.color = item.color;
  posTag.style.background = item.color + '1a';
  thaiMeaning.textContent = item.thai;
  englishDef.textContent = item.en;
  chapterTagFront.textContent = `Ch.${item.ch} · ${item.chName}`;
  chapterTagBack.textContent = `Ch.${item.ch} · ${item.chName}`;
  progressFill.style.width = `${((currentIndex+1)/activeDeck.length)*100}%`;
  progressText.textContent = `${currentIndex+1} / ${activeDeck.length}`;
  renderWordList();
}
 
function renderWordList(){
  wordList.innerHTML = activeDeck.map((item, idx) => `
    <div class="word-item ${idx===currentIndex?'current':''}" data-idx="${idx}">
      <span>${item.word}</span>
      <span class="meta">Ch.${item.ch} · ${item.pos}</span>
    </div>
  `).join('');
  wordList.querySelectorAll('.word-item').forEach(el => {
    el.addEventListener('click', () => {
      currentIndex = Number(el.dataset.idx);
      renderCard();
    });
  });
}
 
function flipCard(){
  if(activeDeck.length === 0) return;
  isFlipped = !isFlipped;
  flashcard.classList.toggle('flipped', isFlipped);
}
 
function nextCard(){
  if(activeDeck.length === 0) return;
  currentIndex = (currentIndex + 1) % activeDeck.length;
  renderCard();
}
 
function prevCard(){
  if(activeDeck.length === 0) return;
  currentIndex = (currentIndex - 1 + activeDeck.length) % activeDeck.length;
  renderCard();
}
 
function shuffleDeck(){
  for(let i = activeDeck.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [activeDeck[i], activeDeck[j]] = [activeDeck[j], activeDeck[i]];
  }
  currentIndex = 0;
  renderCard();
}
 
flashcard.addEventListener('click', flipCard);
document.getElementById('flipBtn').addEventListener('click', flipCard);
document.getElementById('nextBtn').addEventListener('click', nextCard);
document.getElementById('prevBtn').addEventListener('click', prevCard);
document.getElementById('shuffleBtn').addEventListener('click', shuffleDeck);
searchBox.addEventListener('input', filterDeck);
 
document.getElementById('listToggleBtn').addEventListener('click', () => {
  wordList.classList.toggle('open');
  const btn = document.getElementById('listToggleBtn');
  btn.textContent = wordList.classList.contains('open') ? '📋 Hide Word List' : '📋 Show Word List';
});
 
document.getElementById('themeToggle').addEventListener('click', () => {
  const body = document.body;
  const isDark = body.getAttribute('data-theme') === 'dark';
  body.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeToggle').textContent = isDark ? '🌙 Dark' : '☀️ Light';
});
 
document.addEventListener('keydown', (e) => {
  if(document.activeElement === searchBox) return;
  if(e.key === 'ArrowRight') nextCard();
  else if(e.key === 'ArrowLeft') prevCard();
  else if(e.key === ' ' || e.key === 'Enter'){ e.preventDefault(); flipCard(); }
  else if(e.key.toLowerCase() === 's') shuffleDeck();
});
 
renderChapterBar();
renderCard();
</script>
</body>
</html>
